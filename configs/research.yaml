name: auta_research_default
description: Default research configuration for AUTA 3.0 optimisation and validation.

strategy_config: configs/strategies/two_candle_rejection.yaml

data:
  raw_dir: data/raw
  results_dir: data/results
  date_from: "2024-01-01"
  date_to: "2026-06-16"

symbols:
  - AUDCAD
  - AUDUSD
  - AUDCHF
  - AUDJPY
  - AUDNZD
  - CADCHF
  - CADJPY
  - CHFJPY
  - EURUSD
  - EURAUD
  - EURCAD
  - EURCHF
  - EURGBP
  - EURJPY
  - EURNZD
  - GBPAUD
  - GBPUSD
  - GBPCHF
  - GBPJPY
  - GBPCAD
  - GBPNZD
  - NZDCAD
  - NZDCHF
  - NZDJPY
  - NZDUSD
  - USDCAD
  - USDCHF
  - USDJPY
  - XAGUSD
  - XPDUSD
  - XAUUSD

timeframes:
  - M5
  - M15
  - H1
  - H4
  - D1

optimisation:
  max_variants: 100
  min_trades_for_ranking: 30
  # Set to [H4, D1] for much faster runs; null uses all timeframes above.
  timeframes: [H4, D1]
  save_every: 25
  grid:
    wick_ratio_min: [1.5, 2.0, 2.5]
    body_ratio_min: [1.2, 1.5, 2.0]
    require_body_engulf: [false, true]
    candle1_allowed_colours:
      buy: [["bearish", "flat"], ["bearish"]]
      sell: [["bullish", "flat"], ["bullish"]]
    entry_modes: [next_open, signal_close]
    stop_modes: [pattern_extreme, candle2_extreme]
    tp_r_values: [0.5, 0.75, 1.0, 1.25, 1.5, 2.0]
    atr_buffer_values: [0.0, 0.1]
    trend_filters: ["none", "price_vs_ema_200"]
    volatility_filters: [false, true]
    session_filters: [false, true]

validation:
  mode: rolling
  train_pct: 0.5
  validation_pct: 0.25
  test_pct: 0.25
  rolling:
    train_bars: 2000
    validation_bars: 500
    test_bars: 500
    step_bars: 500
  overfit_threshold_pct: 30.0
  win_rate_claim_threshold: 0.80

reporting:
  output_dir: reports
  assets_dir: reports/assets
  latest_results_dir: data/results/latest
